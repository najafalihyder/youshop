{% extends "base.html" %}
{% block title %}Add Product — YouShop{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <div class="mb-8">
        <h1 class="text-4xl font-bold" style="color: var(--green);">Add Product</h1>
        <p class="mt-1" style="color: var(--muted);">Add a new item to the shop</p>
    </div>
    <div class="card p-8">
        <form action="/admin/add-product" method="post" class="flex flex-col gap-5">
            <div>
                <label class="block text-sm font-600 mb-2">Product Name</label>
                <input type="text" name="name" placeholder="e.g. Basmati Rice" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-600 mb-2">Price (Rs.)</label>
                    <input type="number" name="price" placeholder="120" required>
                </div>
                <div>
                    <label class="block text-sm font-600 mb-2">Unit</label>
                    <select name="unit">
                        <option value="piece">Piece</option>
                        <option value="kg">KG</option>
                        <option value="g">Grams</option>
                        <option value="dozen">Dozen</option>
                        <option value="liter">Liter</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-600 mb-2">Image URL</label>
                <input type="text" name="image_url" placeholder="https://...">
            </div>
            <div>
                <label class="block text-sm font-600 mb-2">Description <span style="color: var(--muted); font-weight: 400;">(optional)</span></label>
                <input type="text" name="description" placeholder="Brief description">
            </div>
            <button type="submit" class="btn-primary text-center mt-2">Add Product</button>
        </form>
    </div>
</div>
{% endblock %}
