{% extends "base.html" %}
{% block title %}Register — YouShop{% endblock %}
{% block content %}
<div class="flex items-center justify-center" style="margin-top: 16px;">
    <div class="card p-8 w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold" style="color: var(--green);">Join YouShop</h1>
            <p class="text-sm mt-1" style="color: var(--muted);">Get wholesale prices in your village</p>
        </div>
        <form action="/register" method="post" class="flex flex-col gap-4">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirmation" placeholder="Confirm password" required>
            <button type="submit" class="btn-primary text-center mt-2">Create Account</button>
        </form>
        <p class="text-center text-sm mt-6" style="color: var(--muted);">
            Already have an account? <a href="/login" style="color: var(--green); font-weight: 600;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
