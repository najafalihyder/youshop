{% extends "base.html" %}
{% block title %}Error — YouShop{% endblock %}
{% block content %}
<div class="flex items-center justify-center" style="min-height: 60vh;">
    <div class="card p-12 text-center max-w-sm w-full">
        <div class="text-5xl mb-4">😕</div>
        <h1 class="text-2xl font-bold mb-2">Oops</h1>
        <p style="color: var(--muted);">{{ message }}</p>
        <a href="javascript:history.back()" class="btn-primary inline-block mt-6">Go Back</a>
    </div>
</div>
{% endblock %}
